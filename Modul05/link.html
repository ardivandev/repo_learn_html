<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML | Link</title>
  </head>
  <body>
    <h1>Link</h1>
    <p>Digunakan untuk membuat link, menggunakan tag <code>a</code></p>
    <hr />
    <p>Contohnya :</p>
    <p>
      Klik link berikut untuk pergi ke halaman google : <a href="https://www.google.com">Google</a>
    </p>
    <p>Contoh Penggunaan Gambar Sebagai Link</p>
    <a href="https://www.youtube.com" title="Go to youtube">
      <img
        src="https://images.unsplash.com/photo-1618243357602-ccba303a3fd6?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Icon Youtube"
        width="200px"
      />
    </a>
    <p>Klik send untuk mengirimkan email : <a href="mailto:testing123@gmail.com">Send</a></p>
    <button onclick="document.location = 'https://www.google.com'">Go To Google</button>
  </body>
</html>
