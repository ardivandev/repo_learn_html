<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML | Form</title>
  </head>
  <body>
    <h1>Form</h1>
    <p>Digunakan agar user dapat input data.</p>
    <hr />

    <p>Contohnya :</p>
    <fieldset>
      <legend>Formulir</legend>
      <p><label for="username">Username : </label><input type="text" id="username" /></p>
      <p><label for="password">Password : </label><input type="password" id="password" /></p>
      <p><label for="date">Tanggal : </label><input type="date" name="date" id="date" /></p>
      <p>
        <label for="man">Man </label><input type="radio" id="man" name="gender" />
        <label for="woman">Woman </label><input type="radio" id="woman" name="gender" />
      </p>
      <p>Teknologi yang sedang dipelajari:</p>
      <p>
        <label for="html">HTML </label><input type="checkbox" id="html" />
        <label for="css">CSS </label><input type="checkbox" id="css" />
        <label for="javascript">Javascript </label><input type="checkbox" id="javascript" />
      </p>
      <p><label for="pesan">Pesan:</label></p>
      <p>
        <textarea name="pesan" id="pesan"></textarea>
      </p>
      <button type="submit">Kirim</button>
      <button type="reset">Reset</button>
    </fieldset>
  </body>
</html>
